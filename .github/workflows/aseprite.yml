name: aseprite-linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, leave empty for latest"
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04   # Linux runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ libx11-dev libxcursor-dev libxrandr-dev \
            libxi-dev libfontconfig1-dev libgl1-mesa-dev libpng-dev git

      - name: Build
        id: build
        run: |
          chmod +x build.sh
          ./build.sh
        env:
          ASEPRITE_VERSION: ${{ github.event.inputs.version }}

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-${{ steps.build.outputs.ASEPRITE_VERSION }}
          path: build
          if-no-files-found: error
